name: Publish to NuGet

# Publishes IDAnalyzer.V2 to nuget.org when a version tag (v*) is pushed.
# Requires a repo/org secret NUGET_API_KEY (create on nuget.org under the
# `idanalyzer` organization, Push scope, glob "IDAnalyzer.*").
# NuGet does not yet support OIDC trusted publishing, so an API key is used.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack IDAnalyzer/IDAnalyzer.csproj -c Release -o artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
